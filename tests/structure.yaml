# Container Structure Tests for Claude Code Docker Wrapper
# Tests run post-build to validate image structure and contents
# Run with: container-structure-test test --image claudedocker:local --config tests/structure.yaml

schemaVersion: 2.0.0

# Test that Claude Code CLI binary is installed and accessible
commandTests:
  - name: "Claude Code binary exists"
    command: "which"
    args: ["claude"]
    expectedOutput: ["/usr/local/bin/claude"]

  - name: "Claude Code is executable"
    command: "claude"
    args: ["--version"]
    exitCode: 0

  - name: "Node.js v22 is installed"
    command: "node"
    args: ["--version"]
    expectedOutput: ["v22\\."]

  - name: "npm is installed"
    command: "npm"
    args: ["--version"]
    exitCode: 0

  - name: "su-exec binary exists"
    command: "which"
    args: ["su-exec"]
    expectedOutput: ["/usr/local/bin/su-exec"]

  - name: "GitHub CLI binary exists"
    command: "which"
    args: ["gh"]
    expectedOutput: ["/usr/local/bin/gh"]

  - name: "GitHub CLI is executable"
    command: "gh"
    args: ["--version"]
    exitCode: 0

# Test file existence and permissions
fileExistenceTests:
  - name: "su-exec binary has correct permissions"
    path: "/usr/local/bin/su-exec"
    permissions: "-rwxr-xr-x"
    uid: 0
    gid: 0

  - name: "entrypoint script exists"
    path: "/usr/local/bin/entrypoint.sh"
    permissions: "-rwxr-xr-x"

  - name: "Claude user home directory exists"
    path: "/home/claude"
    permissions: "drwxr-xr-x"

  - name: "Claude config directory exists"
    path: "/home/claude/.claude"
    shouldExist: true

# Test image metadata
metadataTest:
  labels:
    - key: "org.opencontainers.image.title"
      value: "Claude Code Docker Wrapper"

    - key: "com.claudedocker.node-version"
      value: "22"

  envVars:
    - key: "HOME"
      value: "/home/claude"

    - key: "CLAUDE_CONFIG_DIR"
      value: "/home/claude/.claude"

  workdir: "/project"

  entrypoint: ["/usr/local/bin/entrypoint.sh"]

  cmd: ["claude", "--dangerously-skip-permissions"]
